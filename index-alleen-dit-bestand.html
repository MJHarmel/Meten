<body>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;

/* ---------------------------------------------------------
   Opslag helpers (localStorage)
--------------------------------------------------------- */
const IDX_KEY = "meetfoto_idx";

function safeGet(key) {
  try { return localStorage.getItem(key); } catch (e) { return null; }
}
function safeSet(key, val) {
  try { localStorage.setItem(key, val); return true; } catch (e) { console.error("opslaan mislukt", e); return false; }
}
function safeRemove(key) {
  try { localStorage.removeItem(key); } catch (e) {}
}

async function loadIndex() {
  const v = safeGet(IDX_KEY);
  return v ? JSON.parse(v) : [];
}
async function saveIndex(list) {
  safeSet(IDX_KEY, JSON.stringify(list));
}
async function loadProject(id) {
  const v = safeGet(`meetfoto_proj_${id}`);
  return v ? JSON.parse(v) : null;
}
async function saveProjectData(p) {
  safeSet(`meetfoto_proj_${p.id}`, JSON.stringify(p));
}
async function deleteProjectData(id) {
  safeRemove(`meetfoto_proj_${id}`);
}

/* ---------------------------------------------------------
   Beeld helpers
--------------------------------------------------------- */
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
}

function fileToDataURL(file) {
  return new Promise((resolve, reject) => {
    const r = new FileReader();
    r.onload = () => resolve(r.result);
    r.onerror = reject;
    r.readAsDataURL(file);
  });
}

function loadImage(src) {
  return new Promise((resolve, reject) => {
    const img = new Image();
    img.onload = () => resolve(img);
    img.onerror = reject;
    img.src = src;
  });
}

async function resizeImage(dataURL, maxDim, quality) {
  const img = await loadImage(dataURL);
  let { width, height } = img;
  if (width > maxDim || height > maxDim) {
    if (width >= height) {
      height = Math.round((height * maxDim) / width);
      width = maxDim;
    } else {
      width = Math.round((width * maxDim) / height);
      height = maxDim;
    }
  }
  const canvas = document.createElement("canvas");
  canvas.width = width;
  canvas.height = height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, width, height);
  return { dataURL: canvas.toDataURL("image/jpeg", quality), width, height };
}

/* ---------------------------------------------------------
   Geometrie helpers
--------------------------------------------------------- */
const UNITS = ["mm", "cm", "m", "inch"];

function snapPoint(px, py, candidates, w, h, otherPointPx) {
  const magnetThreshold = 16;
  let best = null;
  let bestDist = magnetThreshold;
  for (const c of candidates) {
    const d = Math.hypot(px - c.x, py - c.y);
    if (d < bestDist) { bestDist = d; best = c; }
  }
  if (best) return { x: best.x, y: best.y, snapped: true };

  if (otherPointPx) {
    const dx = px - otherPointPx.x;
    const dy = py - otherPointPx.y;
    const axisThreshold = 10;
    if (Math.abs(dx) < axisThreshold && Math.abs(dy) > axisThreshold) {
      return { x: otherPointPx.x, y: py, snapped: true };
    }
    if (Math.abs(dy) < axisThreshold && Math.abs(dx) > axisThreshold) {
      return { x: px, y: otherPointPx.y, snapped: true };
    }
  }
  return { x: px, y: py, snapped: false };
}

/* Verzamelt alle bestaande eindpunten (van lijnen, curves en hoeken) als
   snap-kandidaten, plus de vier fotohoeken. */
function collectSnapCandidates(items, w, h, excludeId) {
  const pts = [{ x: 0, y: 0 }, { x: w, y: 0 }, { x: 0, y: h }, { x: w, y: h }];
  items.forEach((it) => {
    if (it.id === excludeId) return;
    if (it.type === "line" || it.type === "curve") {
      pts.push({ x: it.x1 * w, y: it.y1 * h });
      pts.push({ x: it.x2 * w, y: it.y2 * h });
    } else if (it.type === "angle") {
      pts.push({ x: it.vx * w, y: it.vy * h });
      pts.push({ x: it.x1 * w, y: it.y1 * h });
      pts.push({ x: it.x2 * w, y: it.y2 * h });
    }
  });
  return pts;
}

function angleBetween(vx, vy, x1, y1, x2, y2) {
  const a1 = Math.atan2(y1 - vy, x1 - vx);
  const a2 = Math.atan2(y2 - vy, x2 - vx);
  let diff = ((a2 - a1) * 180) / Math.PI;
  diff = ((diff % 360) + 360) % 360;
  if (diff > 180) diff = 360 - diff;
  return diff;
}

/* ---------------------------------------------------------
   Simpele icoontjes
--------------------------------------------------------- */
function Icon({ children, size = 18, color }) {
  return <span style={{ fontSize: size, lineHeight: 1, display: "inline-flex", color }}>{children}</span>;
}

/* ---------------------------------------------------------
   Label: platte, omlijnde tekst (geen kader) evenwijdig aan de lijn
--------------------------------------------------------- */
function AnnoLabel({ x, y, angleDeg = 0, text, sub, color, dimmed }) {
  if (!text) return null;
  return (
    <g transform={`translate(${x},${y}) rotate(${angleDeg})`} style={{ opacity: dimmed ? 0.3 : 1 }}>
      {sub && (
        <text
          y={-11}
          textAnchor="middle"
          fontSize={9.5}
          fontWeight={700}
          fill="#ffd9b8"
          stroke="#10151f"
          strokeWidth={3}
          paintOrder="stroke"
          fontFamily="ui-sans-serif, system-ui"
          letterSpacing="0.03em"
        >
          {sub.toUpperCase()}
        </text>
      )}
      <text
        textAnchor="middle"
        fontSize={15}
        fontWeight={800}
        fill={color}
        stroke="#10151f"
        strokeWidth={3.2}
        paintOrder="stroke"
        fontFamily="ui-monospace, SFMono-Regular, Menlo, monospace"
      >
        {text}
      </text>
    </g>
  );
}

/* Kleine handle-cirkel, herbruikt door alle annotatietypes */
function Handle({ x, y, onDown, color = "#ff8a3d", cursor = "grab" }) {
  return (
    <g>
      <circle cx={x} cy={y} r={20} fill="transparent" style={{ cursor }} onPointerDown={onDown} />
      <circle cx={x} cy={y} r={7} fill="#10151f" stroke={color} strokeWidth={2.5} style={{ pointerEvents: "none" }} />
    </g>
  );
}

/* ---------------------------------------------------------
   Lijn-annotatie (rechte maatlijn)
--------------------------------------------------------- */
function LineAnnotation({ item, w, h, selected, interactive, dimmed, onSelect, onHandleDown }) {
  const x1 = item.x1 * w, y1 = item.y1 * h, x2 = item.x2 * w, y2 = item.y2 * h;
  const angle = Math.atan2(y2 - y1, x2 - x1);
  const ux = Math.cos(angle), uy = Math.sin(angle);
  const px = -uy, py = ux;
  const arrowSize = 9, tick = 8;
  const hasValue = item.value && item.value.toString().trim() !== "";
  const color = selected ? "#ff8a3d" : hasValue ? "#ffb37a" : "#7d8aa3";
  const strokeWidth = selected ? 2.5 : 1.75;

  const mkHead = (bx, by, dirx, diry) => {
    const a1x = bx - dirx * arrowSize + px * arrowSize * 0.45;
    const a1y = by - diry * arrowSize + py * arrowSize * 0.45;
    const a2x = bx - dirx * arrowSize - px * arrowSize * 0.45;
    const a2y = by - diry * arrowSize - py * arrowSize * 0.45;
    return `${bx},${by} ${a1x},${a1y} ${a2x},${a2y}`;
  };

  const labelOffset = 20;
  const mx = (x1 + x2) / 2 + px * labelOffset;
  const my = (y1 + y2) / 2 + py * labelOffset;
  let textAngleDeg = (angle * 180) / Math.PI;
  if (textAngleDeg > 90) textAngleDeg -= 180;
  if (textAngleDeg < -90) textAngleDeg += 180;

  return (
    <g onPointerDown={(e) => { e.stopPropagation(); onSelect(); }} style={{ cursor: "pointer", opacity: dimmed ? 0.28 : 1, transition: "opacity 120ms" }}>
      <line x1={x1} y1={y1} x2={x2} y2={y2} stroke="transparent" strokeWidth={30} />
      <line x1={x1 - px * tick} y1={y1 - py * tick} x2={x1 + px * tick} y2={y1 + py * tick} stroke={color} strokeWidth={1.25} />
      <line x1={x2 - px * tick} y1={y2 - py * tick} x2={x2 + px * tick} y2={y2 + py * tick} stroke={color} strokeWidth={1.25} />
      <line x1={x1} y1={y1} x2={x2} y2={y2} stroke={color} strokeWidth={strokeWidth} strokeDasharray={hasValue ? "0" : "5,4"} />
      <polygon points={mkHead(x1, y1, -ux, -uy)} fill={color} />
      <polygon points={mkHead(x2, y2, ux, uy)} fill={color} />
      {hasValue ? (
        <AnnoLabel x={mx} y={my} angleDeg={textAngleDeg} text={`${item.value} ${item.unit || "cm"}`} sub={item.label} color={color} />
      ) : (
        <text x={mx} y={my + 4} textAnchor="middle" fontSize={13} fill="#8a97ab" stroke="#10151f" strokeWidth={3} paintOrder="stroke">?</text>
      )}
      {interactive && (
        <>
          <Handle x={(x1 + x2) / 2} y={(y1 + y2) / 2} cursor="move" onDown={(e) => { e.stopPropagation(); onHandleDown("move", e); }} />
          <Handle x={x1} y={y1} onDown={(e) => { e.stopPropagation(); onHandleDown("x1y1", e); }} />
          <Handle x={x2} y={y2} onDown={(e) => { e.stopPropagation(); onHandleDown("x2y2", e); }} />
        </>
      )}
    </g>
  );
}

/* ---------------------------------------------------------
   Curve-annotatie (gebogen maatlijn, kwadratische bezier)
--------------------------------------------------------- */
function CurveAnnotation({ item, w, h, selected, interactive, dimmed, onSelect, onHandleDown }) {
  const x1 = item.x1 * w, y1 = item.y1 * h, x2 = item.x2 * w, y2 = item.y2 * h;
  // bx,by is het punt dat de gebruiker zelf aantikt en dat ALTIJD op de curve
  // zelf ligt (zichtbaar, nooit ver weg) — het eigenlijke Bezier-controlepunt
  // ligt op 2x die afstand en wordt alleen intern afgeleid om te tekenen.
  const bx = item.bx * w, by = item.by * h;
  const cx = 2 * bx - 0.5 * (x1 + x2);
  const cy = 2 * by - 0.5 * (y1 + y2);
  const hasValue = item.value && item.value.toString().trim() !== "";
  const color = selected ? "#ff8a3d" : hasValue ? "#ffb37a" : "#7d8aa3";
  const strokeWidth = selected ? 2.5 : 1.75;

  // Label bij het zichtbare middelpunt (bx,by), iets opzij van de lijnrichting
  const chordAngle = Math.atan2(y2 - y1, x2 - x1);
  const chordPx = -Math.sin(chordAngle), chordPy = Math.cos(chordAngle);

  const tStart = Math.atan2(cy - y1, cx - x1);
  const tEnd = Math.atan2(y2 - cy, x2 - cx);
  const arrowSize = 9;
  const wing = (dirAngle) => ({ px: -Math.sin(dirAngle), py: Math.cos(dirAngle) });

  const mkHead = (bhx, bhy, dirAngle, outward) => {
    const dirx = Math.cos(dirAngle) * outward, diry = Math.sin(dirAngle) * outward;
    const { px: wpx, py: wpy } = wing(dirAngle);
    const a1x = bhx - dirx * arrowSize + wpx * arrowSize * 0.45;
    const a1y = bhy - diry * arrowSize + wpy * arrowSize * 0.45;
    const a2x = bhx - dirx * arrowSize - wpx * arrowSize * 0.45;
    const a2y = bhy - diry * arrowSize - wpy * arrowSize * 0.45;
    return `${bhx},${bhy} ${a1x},${a1y} ${a2x},${a2y}`;
  };

  const labelOffset = 20;
  const mx = bx + chordPx * labelOffset;
  const my = by + chordPy * labelOffset;
  let textAngleDeg = (chordAngle * 180) / Math.PI;
  if (textAngleDeg > 90) textAngleDeg -= 180;
  if (textAngleDeg < -90) textAngleDeg += 180;

  const d = `M ${x1},${y1} Q ${cx},${cy} ${x2},${y2}`;

  return (
    <g onPointerDown={(e) => { e.stopPropagation(); onSelect(); }} style={{ cursor: "pointer", opacity: dimmed ? 0.28 : 1, transition: "opacity 120ms" }}>
      <path d={d} stroke="transparent" strokeWidth={30} fill="none" />
      <path d={d} stroke={color} strokeWidth={strokeWidth} fill="none" strokeDasharray={hasValue ? "0" : "5,4"} />
      <polygon points={mkHead(x1, y1, tStart, -1)} fill={color} />
      <polygon points={mkHead(x2, y2, tEnd, 1)} fill={color} />
      {hasValue ? (
        <AnnoLabel x={mx} y={my} angleDeg={textAngleDeg} text={`${item.value} ${item.unit || "cm"}`} sub={item.label} color={color} />
      ) : (
        <text x={mx} y={my + 4} textAnchor="middle" fontSize={13} fill="#8a97ab" stroke="#10151f" strokeWidth={3} paintOrder="stroke">?</text>
      )}
      {interactive && (
        <>
          <Handle x={x1} y={y1} onDown={(e) => { e.stopPropagation(); onHandleDown("x1y1", e); }} />
          <Handle x={x2} y={y2} onDown={(e) => { e.stopPropagation(); onHandleDown("x2y2", e); }} />
          <Handle x={bx} y={by} onDown={(e) => { e.stopPropagation(); onHandleDown("b", e); }} color="#5fd0a0" />
        </>
      )}
    </g>
  );
}

/* ---------------------------------------------------------
   Hoek-annotatie (twee stralen vanuit één hoekpunt, hoek automatisch berekend)
--------------------------------------------------------- */
function AngleAnnotation({ item, w, h, selected, interactive, dimmed, onSelect, onHandleDown }) {
  const vx = item.vx * w, vy = item.vy * h;
  const x1 = item.x1 * w, y1 = item.y1 * h;
  const x2 = item.x2 * w, y2 = item.y2 * h;
  const color = selected ? "#ff8a3d" : "#8fd3ff";
  const strokeWidth = selected ? 2.5 : 1.75;
  const arrowSize = 9;

  const a1 = Math.atan2(y1 - vy, x1 - vx);
  const a2 = Math.atan2(y2 - vy, x2 - vx);
  let diff = a2 - a1;
  diff = Math.atan2(Math.sin(diff), Math.cos(diff));
  const deg = Math.abs((diff * 180) / Math.PI);

  const R = 26;
  const N = 16;
  const arcPts = [];
  for (let i = 0; i <= N; i++) {
    const a = a1 + (diff * i) / N;
    arcPts.push(`${vx + R * Math.cos(a)},${vy + R * Math.sin(a)}`);
  }
  const bisector = a1 + diff / 2;
  const labelX = vx + (R + 20) * Math.cos(bisector);
  const labelY = vy + (R + 20) * Math.sin(bisector);
  const hasValue = item.value && item.value.toString().trim() !== "";
  const displayText = hasValue ? `${item.value}°` : "?";

  const mkHead = (bx, by, ang) => {
    const dirx = Math.cos(ang), diry = Math.sin(ang);
    const wpx = -Math.sin(ang), wpy = Math.cos(ang);
    const a1x = bx - dirx * arrowSize + wpx * arrowSize * 0.45;
    const a1y = by - diry * arrowSize + wpy * arrowSize * 0.45;
    const a2x = bx - dirx * arrowSize - wpx * arrowSize * 0.45;
    const a2y = by - diry * arrowSize - wpy * arrowSize * 0.45;
    return `${bx},${by} ${a1x},${a1y} ${a2x},${a2y}`;
  };

  return (
    <g onPointerDown={(e) => { e.stopPropagation(); onSelect(); }} style={{ cursor: "pointer", opacity: dimmed ? 0.28 : 1, transition: "opacity 120ms" }}>
      <line x1={vx} y1={vy} x2={x1} y2={y1} stroke="transparent" strokeWidth={30} />
      <line x1={vx} y1={vy} x2={x2} y2={y2} stroke="transparent" strokeWidth={30} />
      <line x1={vx} y1={vy} x2={x1} y2={y1} stroke={color} strokeWidth={strokeWidth} />
      <line x1={vx} y1={vy} x2={x2} y2={y2} stroke={color} strokeWidth={strokeWidth} />
      <polygon points={mkHead(x1, y1, a1)} fill={color} />
      <polygon points={mkHead(x2, y2, a2)} fill={color} />
      <polyline points={arcPts.join(" ")} fill="none" stroke={color} strokeWidth={1.5} />
      <AnnoLabel x={labelX} y={labelY} angleDeg={0} text={displayText} sub={item.label} color={color} />
      {interactive && (
        <>
          <Handle x={vx} y={vy} cursor="move" onDown={(e) => { e.stopPropagation(); onHandleDown("v", e); }} color="#8fd3ff" />
          <Handle x={x1} y={y1} onDown={(e) => { e.stopPropagation(); onHandleDown("e1", e); }} color="#8fd3ff" />
          <Handle x={x2} y={y2} onDown={(e) => { e.stopPropagation(); onHandleDown("e2", e); }} color="#8fd3ff" />
        </>
      )}
    </g>
  );
}

/* ---------------------------------------------------------
   Tekstvak (los HTML-element, geen SVG, i.v.m. tekstterugloop)
--------------------------------------------------------- */
function TextBoxAnno({ item, imgBox, selected, dimmed, onSelect, onDragStart, onResizeStart }) {
  const w = (item.w ? item.w * imgBox.w : 150);
  const h = (item.h ? item.h * imgBox.h : 70);
  return (
    <div
      onPointerDown={(e) => { e.stopPropagation(); onSelect(); onDragStart(e); }}
      style={{
        position: "absolute",
        left: item.x * imgBox.w,
        top: item.y * imgBox.h,
        width: w,
        height: h,
        background: "rgba(37,71,201,0.88)",
        border: selected ? "2px solid #ff8a3d" : "1px solid rgba(255,255,255,0.25)",
        borderRadius: 8,
        padding: "7px 10px",
        color: "#fff",
        fontSize: 12.5,
        lineHeight: 1.4,
        whiteSpace: "pre-wrap",
        wordBreak: "break-word",
        overflow: "hidden",
        cursor: "move",
        opacity: dimmed ? 0.35 : 1,
        touchAction: "none",
        boxShadow: "0 3px 10px rgba(0,0,0,0.35)",
        boxSizing: "border-box",
      }}
    >
      {item.text || "Nieuwe notitie…"}
      {selected && (
        <div
          onPointerDown={(e) => { e.stopPropagation(); onResizeStart(e); }}
          style={{
            position: "absolute",
            right: -12,
            bottom: -12,
            width: 26,
            height: 26,
            borderRadius: "50%",
            background: "#10151f",
            border: "2.5px solid #ff8a3d",
            cursor: "nwse-resize",
            touchAction: "none",
          }}
        />
      )}
    </div>
  );
}

/* ---------------------------------------------------------
   Canvas-export (foto + alle annotaties) als JPG
--------------------------------------------------------- */
function drawArrowHeadCanvas(ctx, bx, by, ang, color, wingAngleFn) {
  const arrowSize = 9;
  const dirx = Math.cos(ang), diry = Math.sin(ang);
  const wpx = -Math.sin(ang), wpy = Math.cos(ang);
  ctx.beginPath();
  ctx.moveTo(bx, by);
  ctx.lineTo(bx - dirx * arrowSize + wpx * arrowSize * 0.45, by - diry * arrowSize + wpy * arrowSize * 0.45);
  ctx.lineTo(bx - dirx * arrowSize - wpx * arrowSize * 0.45, by - diry * arrowSize - wpy * arrowSize * 0.45);
  ctx.closePath();
  ctx.fillStyle = color;
  ctx.fill();
}

function drawLabelCanvas(ctx, x, y, angleDeg, text, sub, color) {
  if (!text) return;
  ctx.save();
  ctx.translate(x, y);
  ctx.rotate((angleDeg * Math.PI) / 180);
  ctx.textAlign = "center";
  ctx.lineJoin = "round";
  if (sub) {
    ctx.font = "700 10px ui-sans-serif, system-ui";
    ctx.lineWidth = 3;
    ctx.strokeStyle = "#10151f";
    ctx.strokeText(sub.toUpperCase(), 0, -11);
    ctx.fillStyle = "#ffd9b8";
    ctx.fillText(sub.toUpperCase(), 0, -11);
  }
  ctx.font = "800 16px ui-monospace, SFMono-Regular, Menlo, monospace";
  ctx.lineWidth = 3.4;
  ctx.strokeStyle = "#10151f";
  ctx.strokeText(text, 0, 0);
  ctx.fillStyle = color;
  ctx.fillText(text, 0, 0);
  ctx.restore();
}

function drawItemOnCanvas(ctx, item, w, h) {
  if (item.type === "line") {
    const hasValue = item.value && item.value.toString().trim() !== "";
    if (!hasValue) return;
    const x1 = item.x1 * w, y1 = item.y1 * h, x2 = item.x2 * w, y2 = item.y2 * h;
    const angle = Math.atan2(y2 - y1, x2 - x1);
    const ux = Math.cos(angle), uy = Math.sin(angle), px = -uy, py = ux;
    const tick = 8;
    const color = "#ffb37a";
    ctx.strokeStyle = color; ctx.fillStyle = color; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x1 - px * tick, y1 - py * tick); ctx.lineTo(x1 + px * tick, y1 + py * tick);
    ctx.moveTo(x2 - px * tick, y2 - py * tick); ctx.lineTo(x2 + px * tick, y2 + py * tick);
    ctx.stroke();
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.lineTo(x2, y2); ctx.stroke();
    drawArrowHeadCanvas(ctx, x1, y1, angle + Math.PI, color);
    drawArrowHeadCanvas(ctx, x2, y2, angle, color);
    const labelOffset = 20;
    const mx = (x1 + x2) / 2 + px * labelOffset, my = (y1 + y2) / 2 + py * labelOffset;
    let ta = (angle * 180) / Math.PI;
    if (ta > 90) ta -= 180; if (ta < -90) ta += 180;
    drawLabelCanvas(ctx, mx, my, ta, `${item.value} ${item.unit || "cm"}`, item.label, color);
  } else if (item.type === "curve") {
    const hasValue = item.value && item.value.toString().trim() !== "";
    if (!hasValue) return;
    const x1 = item.x1 * w, y1 = item.y1 * h, x2 = item.x2 * w, y2 = item.y2 * h;
    const bx = item.bx * w, by = item.by * h;
    const cx = 2 * bx - 0.5 * (x1 + x2), cy = 2 * by - 0.5 * (y1 + y2);
    const color = "#ffb37a";
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(x1, y1); ctx.quadraticCurveTo(cx, cy, x2, y2); ctx.stroke();
    const tStart = Math.atan2(cy - y1, cx - x1);
    const tEnd = Math.atan2(y2 - cy, x2 - cx);
    drawArrowHeadCanvas(ctx, x1, y1, tStart + Math.PI, color);
    drawArrowHeadCanvas(ctx, x2, y2, tEnd, color);
    const chordAngle = Math.atan2(y2 - y1, x2 - x1);
    const cpx = -Math.sin(chordAngle), cpy = Math.cos(chordAngle);
    let ta = (chordAngle * 180) / Math.PI;
    if (ta > 90) ta -= 180; if (ta < -90) ta += 180;
    drawLabelCanvas(ctx, bx + cpx * 20, by + cpy * 20, ta, `${item.value} ${item.unit || "cm"}`, item.label, color);
  } else if (item.type === "angle") {
    const vx = item.vx * w, vy = item.vy * h, x1 = item.x1 * w, y1 = item.y1 * h, x2 = item.x2 * w, y2 = item.y2 * h;
    const color = "#8fd3ff";
    const a1 = Math.atan2(y1 - vy, x1 - vx), a2 = Math.atan2(y2 - vy, x2 - vx);
    let diff = a2 - a1; diff = Math.atan2(Math.sin(diff), Math.cos(diff));
    const deg = Math.abs((diff * 180) / Math.PI);
    ctx.strokeStyle = color; ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(vx, vy); ctx.lineTo(x1, y1); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(vx, vy); ctx.lineTo(x2, y2); ctx.stroke();
    drawArrowHeadCanvas(ctx, x1, y1, a1, color);
    drawArrowHeadCanvas(ctx, x2, y2, a2, color);
    const R = 26, N = 16;
    ctx.beginPath();
    for (let i = 0; i <= N; i++) {
      const a = a1 + (diff * i) / N;
      const px = vx + R * Math.cos(a), py = vy + R * Math.sin(a);
      i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
    }
    ctx.stroke();
    const bisector = a1 + diff / 2;
    drawLabelCanvas(ctx, vx + (R + 20) * Math.cos(bisector), vy + (R + 20) * Math.sin(bisector), 0, `${deg.toFixed(1)}°`, item.label, color);
  } else if (item.type === "text" && item.text) {
    ctx.font = "600 15px ui-sans-serif, system-ui";
    ctx.textAlign = "left";
    ctx.textBaseline = "top";
    const maxWidth = 220;
    const words = item.text.split(/\s+/);
    const lines = [];
    let cur = "";
    words.forEach((word) => {
      const test = cur ? cur + " " + word : word;
      if (ctx.measureText(test).width > maxWidth && cur) { lines.push(cur); cur = word; } else cur = test;
    });
    if (cur) lines.push(cur);
    const px0 = item.x * w, py0 = item.y * h;
    const lineH = 19;
    const boxW = Math.min(maxWidth, Math.max(...lines.map((l) => ctx.measureText(l).width))) + 20;
    const boxH = lines.length * lineH + 14;
    ctx.fillStyle = "rgba(37,71,201,0.88)";
    ctx.beginPath();
    ctx.roundRect ? ctx.roundRect(px0, py0, boxW, boxH, 8) : ctx.rect(px0, py0, boxW, boxH);
    ctx.fill();
    ctx.fillStyle = "#ffffff";
    lines.forEach((l, i) => ctx.fillText(l, px0 + 10, py0 + 7 + i * lineH));
  }
}

async function exportProjectAsJpg(project, items) {
  const img = await loadImage(project.image);
  const canvas = document.createElement("canvas");
  canvas.width = project.width;
  canvas.height = project.height;
  const ctx = canvas.getContext("2d");
  ctx.drawImage(img, 0, 0, project.width, project.height);
  items.forEach((it) => drawItemOnCanvas(ctx, it, project.width, project.height));
  const dataURL = canvas.toDataURL("image/jpeg", 0.92);
  const a = document.createElement("a");
  a.href = dataURL;
  const safeName = (project.name || "meetfoto").replace(/[^a-z0-9_\-]+/gi, "_");
  a.download = `${safeName}.jpg`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}
/* ---------------------------------------------------------
   Loep: ingezoomde live-preview, los van de vinger
--------------------------------------------------------- */
function Magnifier({ project, point, imgBox }) {
  const MSIZE = 132;
  const ZOOM = 2.6;
  const scaledW = imgBox.w * ZOOM;
  const scaledH = imgBox.h * ZOOM;
  const tx = MSIZE / 2 - point.x * scaledW;
  const ty = MSIZE / 2 - point.y * scaledH;

  return (
    <div style={{ position: "absolute", top: 12, left: "50%", transform: "translateX(-50%)", width: MSIZE, height: MSIZE, borderRadius: "50%", overflow: "hidden", border: "3px solid #ff8a3d", boxShadow: "0 6px 18px rgba(0,0,0,0.5)", pointerEvents: "none", zIndex: 30, background: "#0c1119" }}>
      <div style={{ position: "absolute", left: tx, top: ty, width: scaledW, height: scaledH }}>
        <img src={project.image} alt="" style={{ width: "100%", height: "100%", display: "block" }} />
      </div>
      <div style={{ position: "absolute", left: MSIZE / 2 - 1, top: 0, width: 2, height: MSIZE, background: "rgba(255,138,61,0.55)" }} />
      <div style={{ position: "absolute", top: MSIZE / 2 - 1, left: 0, height: 2, width: MSIZE, background: "rgba(255,138,61,0.55)" }} />
      <div style={{ position: "absolute", left: MSIZE / 2 - 4, top: MSIZE / 2 - 4, width: 8, height: 8, borderRadius: "50%", border: "2px solid #ff8a3d" }} />
    </div>
  );
}

const TOOLS = [
  { key: "line", label: "Pijl", icon: "↗" },
  { key: "curve", label: "Curve", icon: "〰" },
  { key: "angle", label: "Hoek", icon: "∠" },
  { key: "text", label: "Tekst", icon: "Aa" },
];

/* ---------------------------------------------------------
   Editor scherm
--------------------------------------------------------- */
function Editor({ project, onBack, onChange }) {
  const initialItems = (project.arrows || project.items || []).map((a) => {
    const it = { type: "line", ...a };
    if (it.type === "curve" && it.bx === undefined && it.cx !== undefined) {
      // migratie van het oude model (Bezier-controlepunt) naar het nieuwe (zichtbaar middelpunt)
      it.bx = 0.25 * it.x1 + 0.5 * it.cx + 0.25 * it.x2;
      it.by = 0.25 * it.y1 + 0.5 * it.cy + 0.25 * it.y2;
    }
    return it;
  });
  const [items, setItems] = useState(initialItems);
  const [name, setName] = useState(project.name);
  const [editingName, setEditingName] = useState(false);
  const [tool, setTool] = useState(null); // null | 'line' | 'curve' | 'angle' | 'text'
  const [selectedId, setSelectedId] = useState(null);
  const [draft, setDraft] = useState(null);
  const [pending, setPending] = useState(null); // tussenstatus voor curve/hoek (fase 1 klaar, wacht op fase 2)
  const [containerSize, setContainerSize] = useState({ w: 0, h: 0 });
  const [imgBox, setImgBox] = useState({ left: 0, top: 0, w: 0, h: 0 });
  const [magPoint, setMagPoint] = useState(null);
  const wrapRef = useRef(null);
  const imgRef = useRef(null);
  const startRef = useRef(null);
  const dragRef = useRef(null);

  useEffect(() => {
    try { window.history.pushState({ meetfotoView: "editor" }, ""); } catch (e) {}
    const onPop = () => onBack();
    window.addEventListener("popstate", onPop);
    return () => window.removeEventListener("popstate", onPop);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  const measure = () => {
    if (!wrapRef.current || !imgRef.current) return;
    const wrapRect = wrapRef.current.getBoundingClientRect();
    const imgRect = imgRef.current.getBoundingClientRect();
    setImgBox({ left: imgRect.left - wrapRect.left, top: imgRect.top - wrapRect.top, w: imgRect.width, h: imgRect.height });
  };

  useEffect(() => {
    const el = wrapRef.current;
    if (!el) return;
    const ro = new ResizeObserver(() => {
      setContainerSize({ w: el.clientWidth, h: el.clientHeight });
      measure();
    });
    ro.observe(el);
    return () => ro.disconnect();
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, []);

  useEffect(() => {
    const t = setTimeout(() => {
      const updated = { ...project, name, arrows: items };
      saveProjectData(updated);
      onChange({ id: project.id, name });
    }, 400);
    return () => clearTimeout(t);
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [items, name]);

  const relPoint = (clientX, clientY) => {
    const r = imgRef.current.getBoundingClientRect();
    return {
      x: Math.min(1, Math.max(0, (clientX - r.left) / r.width)),
      y: Math.min(1, Math.max(0, (clientY - r.top) / r.height)),
    };
  };

  const selected = items.find((i) => i.id === selectedId) || null;

  const updateSelected = (patch) => {
    setItems((arr) => arr.map((i) => (i.id === selectedId ? { ...i, ...patch } : i)));
  };
  const deleteSelected = () => {
    setItems((arr) => arr.filter((i) => i.id !== selectedId));
    setSelectedId(null);
  };
  const deleteItem = (id) => {
    setItems((arr) => arr.filter((i) => i.id !== id));
    if (selectedId === id) setSelectedId(null);
  };

  /* --- Aanmaken van nieuwe annotaties --- */
  const onPointerDown = (e) => {
    if (!tool) return;
    e.preventDefault();
    e.currentTarget.setPointerCapture(e.pointerId);
    const p = relPoint(e.clientX, e.clientY);
    startRef.current = p;

    if (tool === "text") {
      const newItem = { id: uid(), type: "text", x: p.x, y: p.y, text: "", w: 150 / imgBox.w, h: 70 / imgBox.h };
      setItems((arr) => [...arr, newItem]);
      setSelectedId(newItem.id);
      setTool(null);
      return;
    }
    if (pending && pending.type === "angle") {
      // fase 2: tweede lijn, vast verankerd aan hetzelfde hoekpunt
      setDraft({ x1: pending.vx, y1: pending.vy, x2: p.x, y2: p.y });
      setMagPoint({ x: p.x, y: p.y });
      return;
    }
    if (pending && pending.type === "curve") {
      // fase 2: het punt waar de curve doorheen moet buigen
      setDraft({ x1: p.x, y1: p.y, x2: p.x, y2: p.y });
      setMagPoint({ x: p.x, y: p.y });
      return;
    }
    setDraft({ x1: p.x, y1: p.y, x2: p.x, y2: p.y });
    setMagPoint({ x: p.x, y: p.y });
  };

  const onPointerMove = (e) => {
    if (!draft || tool === "text") return;
    e.preventDefault();
    const p = relPoint(e.clientX, e.clientY);
    const px = p.x * imgBox.w, py = p.y * imgBox.h;
    const other = { x: draft.x1 * imgBox.w, y: draft.y1 * imgBox.h };
    const candidates = collectSnapCandidates(items, imgBox.w, imgBox.h);
    const snap = snapPoint(px, py, candidates, imgBox.w, imgBox.h, other);
    setDraft((d) => ({ ...d, x2: snap.x / imgBox.w, y2: snap.y / imgBox.h }));
    setMagPoint({ x: snap.x / imgBox.w, y: snap.y / imgBox.h });
  };

  const onPointerUp = (e) => {
    if (!draft) return;
    const start = startRef.current;
    const distPx = start ? Math.hypot((draft.x2 - start.x) * imgBox.w, (draft.y2 - start.y) * imgBox.h) : 0;

    if (tool === "line") {
      if (distPx > 20) {
        const it = { id: uid(), type: "line", x1: draft.x1, y1: draft.y1, x2: draft.x2, y2: draft.y2, value: "", unit: "cm", label: "" };
        setItems((arr) => [...arr, it]);
        setSelectedId(it.id);
        setTool(null);
      }
    } else if (tool === "curve") {
      if (!pending) {
        // fase 1 klaar: begin- en eindpunt bekend, wacht op het buigpunt
        if (distPx > 20) setPending({ type: "curve", x1: draft.x1, y1: draft.y1, x2: draft.x2, y2: draft.y2 });
      } else {
        // fase 2 klaar: het aangetikte punt wordt rechtstreeks opgeslagen als
        // het middelpunt van de curve (bx,by) — altijd zichtbaar, geen berekening nodig
        const it = { id: uid(), type: "curve", x1: pending.x1, y1: pending.y1, x2: pending.x2, y2: pending.y2, bx: draft.x2, by: draft.y2, value: "", unit: "cm", label: "" };
        setItems((arr) => [...arr, it]);
        setSelectedId(it.id);
        setPending(null);
        setTool(null);
      }
    } else if (tool === "angle") {
      if (!pending) {
        // fase 1 klaar: hoekpunt + eerste lijn bekend, wacht op de tweede lijn
        if (distPx > 20) setPending({ type: "angle", vx: draft.x1, vy: draft.y1, x1: draft.x2, y1: draft.y2 });
      } else if (distPx > 20) {
        const it = { id: uid(), type: "angle", vx: pending.vx, vy: pending.vy, x1: pending.x1, y1: pending.y1, x2: draft.x2, y2: draft.y2, value: "", label: "" };
        setItems((arr) => [...arr, it]);
        setSelectedId(it.id);
        setPending(null);
        setTool(null);
      }
    }
    setDraft(null);
    startRef.current = null;
    setMagPoint(null);
  };

  /* --- Slepen van bestaande handles --- */
  const onHandleDown = (itemId, endKey, e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    const item = items.find((i) => i.id === itemId);
    dragRef.current = { itemId, endKey, startItem: { ...item }, startClientX: e.clientX, startClientY: e.clientY };
  };

  const onHandleMove = (e) => {
    const d = dragRef.current;
    if (!d || !imgBox.w) return;
    e.preventDefault();
    const r = imgRef.current.getBoundingClientRect();
    const px = e.clientX - r.left;
    const py = e.clientY - r.top;
    const w = imgBox.w, h = imgBox.h;
    const it = d.startItem;

    const dxPx = e.clientX - d.startClientX;
    const dyPx = e.clientY - d.startClientY;
    const dxRel = dxPx / w, dyRel = dyPx / h;
    const clamp = (v) => Math.min(1, Math.max(0, v));

    if (it.type === "line" || it.type === "curve") {
      if (d.endKey === "move") {
        setItems((arr) => arr.map((i) => i.id === d.itemId ? {
          ...i,
          x1: clamp(it.x1 + dxRel), y1: clamp(it.y1 + dyRel),
          x2: clamp(it.x2 + dxRel), y2: clamp(it.y2 + dyRel),
          ...(it.type === "curve" ? { bx: clamp(it.bx + dxRel), by: clamp(it.by + dyRel) } : {}),
        } : i));
        setMagPoint({ x: clamp(it.x1 + dxRel), y: clamp(it.y1 + dyRel) });
      } else if (d.endKey === "b") {
        const relX = clamp(px / w), relY = clamp(py / h);
        setItems((arr) => arr.map((i) => (i.id === d.itemId ? { ...i, bx: relX, by: relY } : i)));
        setMagPoint({ x: relX, y: relY });
      } else {
        const otherPx = d.endKey === "x1y1" ? { x: it.x2 * w, y: it.y2 * h } : { x: it.x1 * w, y: it.y1 * h };
        const candidates = collectSnapCandidates(items, w, h, d.itemId);
        const snap = snapPoint(px, py, candidates, w, h, otherPx);
        const relX = clamp(snap.x / w), relY = clamp(snap.y / h);
        setItems((arr) => arr.map((i) => {
          if (i.id !== d.itemId) return i;
          return d.endKey === "x1y1" ? { ...i, x1: relX, y1: relY } : { ...i, x2: relX, y2: relY };
        }));
        setMagPoint({ x: relX, y: relY });
      }
    } else if (it.type === "angle") {
      if (d.endKey === "v") {
        setItems((arr) => arr.map((i) => i.id === d.itemId ? {
          ...i,
          vx: clamp(it.vx + dxRel), vy: clamp(it.vy + dyRel),
          x1: clamp(it.x1 + dxRel), y1: clamp(it.y1 + dyRel),
          x2: clamp(it.x2 + dxRel), y2: clamp(it.y2 + dyRel),
        } : i));
        setMagPoint({ x: clamp(it.vx + dxRel), y: clamp(it.vy + dyRel) });
      } else {
        const candidates = collectSnapCandidates(items, w, h, d.itemId);
        const vertexPx = { x: it.vx * w, y: it.vy * h };
        const snap = snapPoint(px, py, candidates, w, h, vertexPx);
        const relX = clamp(snap.x / w), relY = clamp(snap.y / h);
        setItems((arr) => arr.map((i) => {
          if (i.id !== d.itemId) return i;
          return d.endKey === "e1" ? { ...i, x1: relX, y1: relY } : { ...i, x2: relX, y2: relY };
        }));
        setMagPoint({ x: relX, y: relY });
      }
    }
  };

  const onHandleUp = () => { dragRef.current = null; setMagPoint(null); };

  /* --- Tekstvak verslepen én van formaat veranderen (zelfde ref, twee modi) --- */
  const textDragRef = useRef(null);
  const onTextDragStart = (item, e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    textDragRef.current = { mode: "move", itemId: item.id, startX: item.x, startY: item.y, startClientX: e.clientX, startClientY: e.clientY };
  };
  const onTextResizeStart = (item, e) => {
    e.currentTarget.setPointerCapture(e.pointerId);
    const startW = item.w ? item.w * imgBox.w : 150;
    const startH = item.h ? item.h * imgBox.h : 70;
    textDragRef.current = { mode: "resize", itemId: item.id, startW, startH, startClientX: e.clientX, startClientY: e.clientY };
  };
  const onTextDragMove = (e) => {
    const d = textDragRef.current;
    if (!d || !imgBox.w) return;
    e.preventDefault();
    if (d.mode === "resize") {
      const newWpx = Math.max(60, d.startW + (e.clientX - d.startClientX));
      const newHpx = Math.max(32, d.startH + (e.clientY - d.startClientY));
      setItems((arr) => arr.map((i) => (i.id === d.itemId ? { ...i, w: newWpx / imgBox.w, h: newHpx / imgBox.h } : i)));
    } else {
      const dxRel = (e.clientX - d.startClientX) / imgBox.w;
      const dyRel = (e.clientY - d.startClientY) / imgBox.h;
      const nx = Math.min(1, Math.max(0, d.startX + dxRel));
      const ny = Math.min(1, Math.max(0, d.startY + dyRel));
      setItems((arr) => arr.map((i) => (i.id === d.itemId ? { ...i, x: nx, y: ny } : i)));
    }
  };
  const onTextDragEnd = () => { textDragRef.current = null; };

  const toggleTool = (key) => {
    setTool((t) => (t === key ? null : key));
    setSelectedId(null);
    setPending(null);
    setDraft(null);
  };

  return (
    <div className="editor-root" style={styles.editorRoot}>
      <div style={styles.topbar}>
        <button style={styles.backBtn} onClick={() => { try { window.history.back(); } catch (e) { onBack(); } }} aria-label="Terug naar projecten">
          <Icon size={17} color="#eef2f7">←</Icon>
          <span style={{ marginLeft: 6 }}>Projecten</span>
        </button>
        {editingName ? (
          <input autoFocus value={name} onChange={(e) => setName(e.target.value)} onBlur={() => setEditingName(false)} onKeyDown={(e) => e.key === "Enter" && setEditingName(false)} style={styles.nameInput} />
        ) : (
          <button style={styles.nameBtn} onClick={() => setEditingName(true)}>
            <span style={styles.nameText}>{name}</span>
            <Icon size={13} color="#8a97ab">✏️</Icon>
          </button>
        )}
        <button style={styles.iconBtn} onClick={() => exportProjectAsJpg(project, items)} aria-label="Opslaan als foto">
          <Icon size={18} color="#eef2f7">⬇️</Icon>
        </button>
      </div>

      <div ref={wrapRef} style={styles.imgWrap}>
        <img ref={imgRef} src={project.image} alt={name} draggable={false} style={styles.img} onLoad={measure} />

        {imgBox.w > 0 && (
          <>
            <svg
              width={imgBox.w} height={imgBox.h}
              style={{ position: "absolute", left: imgBox.left, top: imgBox.top, touchAction: "none" }}
              onPointerDown={onPointerDown}
              onPointerMove={(e) => { onPointerMove(e); onHandleMove(e); }}
              onPointerUp={(e) => { onPointerUp(e); onHandleUp(); }}
              onPointerCancel={() => { onHandleUp(); setDraft(null); setMagPoint(null); }}
            >
              {items.filter((i) => i.type === "line").map((it) => (
                <LineAnnotation key={it.id} item={it} w={imgBox.w} h={imgBox.h} selected={it.id === selectedId} interactive={it.id === selectedId} dimmed={selectedId && it.id !== selectedId} onSelect={() => setSelectedId(it.id)} onHandleDown={(k, e) => onHandleDown(it.id, k, e)} />
              ))}
              {items.filter((i) => i.type === "curve").map((it) => (
                <CurveAnnotation key={it.id} item={it} w={imgBox.w} h={imgBox.h} selected={it.id === selectedId} interactive={it.id === selectedId} dimmed={selectedId && it.id !== selectedId} onSelect={() => setSelectedId(it.id)} onHandleDown={(k, e) => onHandleDown(it.id, k, e)} />
              ))}
              {items.filter((i) => i.type === "angle").map((it) => (
                <AngleAnnotation key={it.id} item={it} w={imgBox.w} h={imgBox.h} selected={it.id === selectedId} interactive={it.id === selectedId} dimmed={selectedId && it.id !== selectedId} onSelect={() => setSelectedId(it.id)} onHandleDown={(k, e) => onHandleDown(it.id, k, e)} />
              ))}
              {pending && pending.type === "angle" && (
                <line x1={pending.vx * imgBox.w} y1={pending.vy * imgBox.h} x2={pending.x1 * imgBox.w} y2={pending.y1 * imgBox.h} stroke="#8fd3ff" strokeWidth={2} />
              )}
              {pending && pending.type === "curve" && (
                <line x1={pending.x1 * imgBox.w} y1={pending.y1 * imgBox.h} x2={pending.x2 * imgBox.w} y2={pending.y2 * imgBox.h} stroke="#ff8a3d" strokeWidth={1} strokeDasharray="3,4" opacity={0.5} />
              )}
              {draft && tool !== "text" && (
                pending && pending.type === "curve" ? (
                  <path d={`M ${pending.x1 * imgBox.w},${pending.y1 * imgBox.h} Q ${2 * draft.x2 * imgBox.w - 0.5 * (pending.x1 * imgBox.w + pending.x2 * imgBox.w)},${2 * draft.y2 * imgBox.h - 0.5 * (pending.y1 * imgBox.h + pending.y2 * imgBox.h)} ${pending.x2 * imgBox.w},${pending.y2 * imgBox.h}`} stroke="#ff8a3d" strokeWidth={2} strokeDasharray="6,4" fill="none" />
                ) : tool === "curve" ? (
                  <path d={`M ${draft.x1 * imgBox.w},${draft.y1 * imgBox.h} L ${draft.x2 * imgBox.w},${draft.y2 * imgBox.h}`} stroke="#ff8a3d" strokeWidth={2} strokeDasharray="6,4" fill="none" />
                ) : (
                  <line x1={draft.x1 * imgBox.w} y1={draft.y1 * imgBox.h} x2={draft.x2 * imgBox.w} y2={draft.y2 * imgBox.h} stroke={tool === "angle" ? "#8fd3ff" : "#ff8a3d"} strokeWidth={2} strokeDasharray="6,4" />
                )
              )}
            </svg>

            <div style={{ position: "absolute", left: imgBox.left, top: imgBox.top, width: imgBox.w, height: imgBox.h, pointerEvents: "none" }}>
              {items.filter((i) => i.type === "text").map((it) => (
                <div key={it.id} style={{ pointerEvents: "auto" }} onPointerMove={onTextDragMove} onPointerUp={onTextDragEnd} onPointerCancel={onTextDragEnd}>
                  <TextBoxAnno item={it} imgBox={imgBox} selected={it.id === selectedId} dimmed={selectedId && it.id !== selectedId} onSelect={() => setSelectedId(it.id)} onDragStart={(e) => onTextDragStart(it, e)} onResizeStart={(e) => onTextResizeStart(it, e)} />
                </div>
              ))}
            </div>

            {magPoint && <Magnifier project={project} point={magPoint} imgBox={imgBox} />}

            {/* Bovenoverlay: hint tijdens tekenen, of anders de annotatielijst — nooit beide, dus geen verspringing */}
            {tool ? (
              <div style={styles.hintBarOverlay}>
                {tool === "text"
                  ? "Tik op de foto om een tekstvak te plaatsen"
                  : tool === "angle"
                  ? (pending ? "Sleep nu de tweede lijn vanaf hetzelfde hoekpunt" : "Sleep de eerste lijn vanaf het hoekpunt")
                  : tool === "curve"
                  ? (pending ? "Tik het punt aan waar de curve doorheen moet buigen" : "Sleep van begin- naar eindpunt")
                  : "Sleep over de foto — blijft aan tot je opnieuw op het gereedschap tikt"}
              </div>
            ) : items.length > 0 ? (
              <div style={styles.chipRowOverlay}>
                {items.map((it, i) => {
                  const isSel = it.id === selectedId;
                  let label, value;
                  if (it.type === "text") { label = "Notitie"; value = it.text ? it.text.slice(0, 14) : "leeg"; }
                  else if (it.type === "angle") { label = it.label || `Hoek ${i + 1}`; value = `${angleBetween(it.vx, it.vy, it.x1, it.y1, it.x2, it.y2).toFixed(1)}°`; }
                  else { label = it.label || `Lijn ${i + 1}`; value = it.value ? `${it.value} ${it.unit}` : "leeg"; }
                  return (
                    <button key={it.id} onClick={() => setSelectedId(it.id)} style={{ ...styles.chip, ...(isSel ? styles.chipActive : null) }}>
                      <span style={styles.chipDot} />
                      <span style={styles.chipLabel}>{label}</span>
                      <span style={styles.chipValue}>{value}</span>
                      <span role="button" onClick={(e) => { e.stopPropagation(); deleteItem(it.id); }} style={styles.chipDelete} aria-label="Verwijder">✕</span>
                    </button>
                  );
                })}
              </div>
            ) : null}

            {/* Bewerkpaneel: overlay onderin, beïnvloedt de fotogrootte niet */}
            {selected && (
              <div style={styles.panelOverlay}>
                {selected.type === "text" && (
                  <>
                    <textarea autoFocus value={selected.text} onChange={(e) => updateSelected({ text: e.target.value })} placeholder="Typ je notitie…" style={styles.textarea} rows={3} />
                    <div style={styles.panelRow}>
                      <button style={styles.deleteBtn} onClick={deleteSelected}><Icon size={17} color="#ff6b6b">🗑</Icon></button>
                      <button style={{ ...styles.doneBtn, flex: 1, justifyContent: "center" }} onClick={() => setSelectedId(null)}><Icon size={16} color="#10151f">✓</Icon><span style={{ marginLeft: 6 }}>Klaar</span></button>
                    </div>
                  </>
                )}
                {selected.type === "angle" && (
                  <>
                    <div style={styles.panelRow}>
                      <input placeholder="Naam (optioneel)" value={selected.label} onChange={(e) => updateSelected({ label: e.target.value })} style={styles.panelInputWide} />
                      <button style={styles.deleteBtn} onClick={deleteSelected}><Icon size={17} color="#ff6b6b">🗑</Icon></button>
                    </div>
                    <div style={styles.panelRow}>
                      <input
                        autoFocus
                        inputMode="decimal"
                        placeholder={`gemeten: ${angleBetween(selected.vx, selected.vy, selected.x1, selected.y1, selected.x2, selected.y2).toFixed(1)}°`}
                        value={selected.value}
                        onChange={(e) => updateSelected({ value: e.target.value.replace(",", ".") })}
                        style={styles.panelInputValue}
                      />
                      <span style={{ color: "#8a97ab", fontSize: 15, fontWeight: 700 }}>°</span>
                      <button style={styles.doneBtn} onClick={() => setSelectedId(null)}><Icon size={16} color="#10151f">✓</Icon><span style={{ marginLeft: 6 }}>Klaar</span></button>
                    </div>
                  </>
                )}
                {(selected.type === "line" || selected.type === "curve") && (
                  <>
                    <div style={styles.panelRow}>
                      <input placeholder="Naam (bijv. Hoogte)" value={selected.label} onChange={(e) => updateSelected({ label: e.target.value })} style={styles.panelInputWide} />
                      <button style={styles.deleteBtn} onClick={deleteSelected}><Icon size={17} color="#ff6b6b">🗑</Icon></button>
                    </div>
                    <div style={styles.panelRow}>
                      <input autoFocus inputMode="decimal" placeholder="Waarde" value={selected.value} onChange={(e) => updateSelected({ value: e.target.value.replace(",", ".") })} style={styles.panelInputValue} />
                      <select value={selected.unit} onChange={(e) => updateSelected({ unit: e.target.value })} style={styles.select}>
                        {UNITS.map((u) => <option key={u} value={u}>{u}</option>)}
                      </select>
                      <button style={styles.doneBtn} onClick={() => setSelectedId(null)}><Icon size={16} color="#10151f">✓</Icon><span style={{ marginLeft: 6 }}>Klaar</span></button>
                    </div>
                  </>
                )}
              </div>
            )}
          </>
        )}
      </div>

      {/* Vast gereedschapsrijtje onderin — verandert nooit van hoogte */}
      <div style={styles.toolRow}>
        {TOOLS.map((t) => (
          <button key={t.key} onClick={() => toggleTool(t.key)} style={{ ...styles.toolBtn, ...(tool === t.key ? styles.toolBtnActive : null) }}>
            <span style={styles.toolIcon}>{t.icon}</span>
            <span style={styles.toolLabel}>{t.label}</span>
          </button>
        ))}
      </div>
    </div>
  );
}
/* ---------------------------------------------------------
   Galerij scherm
--------------------------------------------------------- */
function Gallery({ projects, onOpen, onCreate, onDelete, busy }) {
  const fileRef = useRef(null);
  const [confirmId, setConfirmId] = useState(null);
  const [installAvailable, setInstallAvailable] = useState(!!window.__meetfotoInstallPrompt);
  const [installed, setInstalled] = useState(window.matchMedia("(display-mode: standalone)").matches);
  const [swReady, setSwReady] = useState(false);

  useEffect(() => {
    const onAvail = () => setInstallAvailable(!!window.__meetfotoInstallPrompt);
    window.addEventListener("meetfoto-install-available", onAvail);
    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.ready.then(() => setSwReady(true)).catch(() => {});
    }
    return () => window.removeEventListener("meetfoto-install-available", onAvail);
  }, []);

  const handleInstallClick = async () => {
    const promptEvent = window.__meetfotoInstallPrompt;
    if (!promptEvent) return;
    promptEvent.prompt();
    await promptEvent.userChoice;
    window.__meetfotoInstallPrompt = null;
    setInstallAvailable(false);
  };

  return (
    <div style={styles.galleryRoot}>
      <div style={styles.header}>
        <div>
          <div style={styles.eyebrow}>MEETFOTO'S</div>
          <h1 style={styles.h1}>Projecten</h1>
        </div>
        <button style={styles.fab} onClick={() => fileRef.current?.click()} aria-label="Foto toevoegen" disabled={busy}>
          <Icon size={22} color="#10151f">＋</Icon>
        </button>
      </div>

      <input ref={fileRef} type="file" accept="image/*" style={{ display: "none" }}
        onChange={(e) => { const f = e.target.files?.[0]; if (f) onCreate(f); e.target.value = ""; }} />

      {installed ? (
        <p style={styles.installOk}>✓ Geïnstalleerd als app — dit venster draait standalone.</p>
      ) : installAvailable ? (
        <button style={styles.installBtn} onClick={handleInstallClick}>
          <Icon size={16} color="#10151f">⬇️</Icon>
          <span style={{ marginLeft: 8 }}>App installeren op dit toestel</span>
        </button>
      ) : (
        <p style={styles.homeTip}>
          {swReady
            ? "Nog niet installeerbaar aangeboden door Chrome. Ververs deze pagina eenmaal (pull-to-refresh) — de knop verschijnt hier zodra het kan."
            : "Bezig met voorbereiden voor installatie… even geduld of ververs de pagina."}
        </p>
      )}

      {projects.length === 0 ? (
        <div style={styles.empty}>
          <Icon size={40} color="#3a4762">📷</Icon>
          <p style={styles.emptyText}>Nog geen project. Maak een foto van je kastje en teken de maatvoering erin.</p>
          <button style={styles.primaryBtn} onClick={() => fileRef.current?.click()}>
            <Icon size={17}>📷</Icon><span style={{ marginLeft: 8 }}>Foto maken / kiezen</span>
          </button>
        </div>
      ) : (
        <div style={styles.grid}>
          {projects.slice().sort((a, b) => b.createdAt - a.createdAt).map((p) => (
            <div key={p.id} style={styles.card}>
              <button style={styles.cardImgBtn} onClick={() => onOpen(p.id)}>
                <img src={p.thumb} alt={p.name} style={styles.cardImg} />
                <div style={styles.cardCornerTick} />
              </button>
              <div style={styles.cardFooter}>
                <span style={styles.cardName}>{p.name}</span>
                {confirmId === p.id ? (
                  <span style={{ display: "flex", gap: 6 }}>
                    <button style={styles.confirmYes} onClick={() => { onDelete(p.id); setConfirmId(null); }}>Ja</button>
                    <button style={styles.confirmNo} onClick={() => setConfirmId(null)}>Nee</button>
                  </span>
                ) : (
                  <button style={styles.trashBtn} onClick={() => setConfirmId(p.id)} aria-label="Verwijder project">
                    <Icon size={14} color="#5c6a84">🗑</Icon>
                  </button>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
      {busy && <div style={styles.toast}>Foto verwerken…</div>}
    </div>
  );
}

/* ---------------------------------------------------------
   Root app
--------------------------------------------------------- */
function App() {
  const [projects, setProjects] = useState([]);
  const [openId, setOpenId] = useState(null);
  const [current, setCurrent] = useState(null);
  const [busy, setBusy] = useState(false);
  const [ready, setReady] = useState(false);

  useEffect(() => {
    (async () => {
      const idx = await loadIndex();
      setProjects(idx);
      setReady(true);
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js").catch(() => {});
      }
    })();
  }, []);

  const handleCreate = async (file) => {
    setBusy(true);
    try {
      const rawDataURL = await fileToDataURL(file);
      const full = await resizeImage(rawDataURL, 1600, 0.82);
      const thumb = await resizeImage(rawDataURL, 320, 0.7);
      const id = uid();
      const now = Date.now();
      const name = `Project ${new Date(now).toLocaleDateString("nl-NL", { day: "2-digit", month: "2-digit" })}`;
      const project = { id, name, image: full.dataURL, width: full.width, height: full.height, arrows: [], createdAt: now };
      await saveProjectData(project);
      const idxEntry = { id, name, thumb: thumb.dataURL, createdAt: now };
      const newIdx = [...projects, idxEntry];
      setProjects(newIdx);
      await saveIndex(newIdx);
      setCurrent(project);
      setOpenId(id);
    } catch (e) {
      console.error("Aanmaken project mislukt", e);
    } finally {
      setBusy(false);
    }
  };

  const handleOpen = async (id) => {
    const p = await loadProject(id);
    if (p) { setCurrent(p); setOpenId(id); }
  };

  const handleDelete = async (id) => {
    await deleteProjectData(id);
    const newIdx = projects.filter((p) => p.id !== id);
    setProjects(newIdx);
    await saveIndex(newIdx);
  };

  const handleEditorChange = ({ id, name }) => {
    setProjects((idx) => {
      const updated = idx.map((p) => (p.id === id ? { ...p, name } : p));
      saveIndex(updated);
      return updated;
    });
  };

  if (!ready) return <div style={styles.loading}>Laden…</div>;

  return (
    <div style={styles.app}>
      {openId && current ? (
        <Editor key={openId} project={current} onBack={() => { setOpenId(null); setCurrent(null); }} onChange={handleEditorChange} />
      ) : (
        <Gallery projects={projects} onOpen={handleOpen} onCreate={handleCreate} onDelete={handleDelete} busy={busy} />
      )}
    </div>
  );
}

function setRealViewportHeight() {
  document.documentElement.style.setProperty("--vh", window.innerHeight * 0.01 + "px");
}
setRealViewportHeight();
window.addEventListener("resize", setRealViewportHeight);
window.addEventListener("orientationchange", () => setTimeout(setRealViewportHeight, 100));

// Vangt Chrome's eigen installatie-aanbod op (i.p.v. via browsermenu's te zoeken).
// Dit event vuurt alleen als de site daadwerkelijk aan alle PWA-installatie-eisen
// voldoet (manifest + geldige iconen + werkende service worker) — als dit event
// nooit binnenkomt, weten we zeker dat er nog iets aan de installeerbaarheid mankeert.
window.__meetfotoInstallPrompt = null;
window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  window.__meetfotoInstallPrompt = e;
  window.dispatchEvent(new Event("meetfoto-install-available"));
});
window.addEventListener("appinstalled", () => {
  window.__meetfotoInstallPrompt = null;
  window.dispatchEvent(new Event("meetfoto-install-available"));
});

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App />);
